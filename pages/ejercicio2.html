<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="descripcion" content="ejercicios del trabajo ractico 5" />
    <meta name="athor" content="Almaraz Abel" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>TPNº 5 Ejercicios DOM y BOM</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="../index.html">Practica DOM y BOM</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Dropdown
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main class="container mt-4">
      <div
        class="container d-flex justify-content-center align-items-center min-vh-100"
      >
        <div class="card p-4 " style="width: 100%; max-width: 500px; background-color: rgba(161, 154, 154, 0.308);">
          <h3 class="text-center mb-3">Crear Persona</h3>

          <form id="formPersona">
            <input
              class="form-control mb-2"
              type="text"
              id="nombre"
              placeholder="Nombre"
              min="4"
              maxlength="30"
              required
            />
            <input
              class="form-control mb-2"
              type="number"
              id="edad"
              placeholder="Edad"
              min="0"
              required
            />
            <input
              class="form-control mb-2"
              type="text"
              id="dni"
              placeholder="DNI"
              maxlength="8"
              required
            />

            <select class="form-control mb-2" id="sexo">
              <option value="H">Hombre</option>
              <option value="M">Mujer</option>
            </select>

            <input
              class="form-control mb-2"
              type="number"
              id="peso"
              placeholder="Peso (kg)"
              required
            />
            <!--step te dice de cuanto va aumentando un numero-->
            <input
              class="form-control mb-2"
              type="number"
              step="0.01"      
              
              id="altura"
              placeholder="Altura (m)"
              required
            />
            <input
              class="form-control mb-2"
              type="number"
              id="anioNacimiento"
              placeholder="Año de nacimiento"
              maxlength="4"
              required
            />

            <button type="submit" class="btn btn-primary w-100">
              Crear Persona
            </button>
          </form>

          <hr />

            <!--type="button" para que no se ierdan los datos -->

          <button type="button" class="btn btn-success mb-2 w-100" onclick="mostrarGen()">
            Mostrar Generación
          </button>
          <button  type="button" class="btn btn-warning mb-2 w-100" onclick="mayorEdad()">
            ¿Es mayor de edad?
          </button>
          <button type="button" class="btn btn-info w-100" onclick="mostrarInfo()">
            Mostrar Datos
          </button>
        </div>
      </div>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../js/ejercicio2.js"></script>
  </body>
</html>
